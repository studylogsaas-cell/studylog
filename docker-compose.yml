services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studylog
      POSTGRES_PASSWORD: studylog_pass
      POSTGRES_DB: studylog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U studylog" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://studylog:studylog_pass@postgres:5432/studylog
      JWT_SECRET: studylog-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: studylog-refresh-secret-change-in-production
      PORT: "3001"
      FRONTEND_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
